<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Strideline</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0C1211; color:#f2f2f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
  h1 { font-size:2.4rem; margin-bottom:8px; }
  .accent { color:#1F8A70; }
  p.tag { color:#c9c9c6; font-size:1.15rem; line-height:1.5; }
  .card { background:#131C1A; border-radius:16px; padding:28px; margin:32px 0; text-align:left; }
  ul { padding-left:20px; line-height:1.9; }
  .price { display:inline-block; margin-top:24px; padding:12px 28px; border-radius:10px; background:#1F8A70; color:#111; font-weight:600; }
  footer { margin-top:60px; color:#8a8a86; font-size:0.9rem; }
  a { color:#1F8A70; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Strideline</h1>
  <p class="tag"></p>
  <div class="card">
    <strong>Free</strong>
    <ul>
      <li>Log up to 40 sessions</li>
      <li>Full add / edit / delete</li>
      <li>Local, private, offline-first</li>
    </ul>
    <strong>Strideline Pro</strong>
    <ul>
      <li>Unlimited sessions</li>
      <li>All pro features unlocked</li>
    </ul>
    <span class="price">1.99 USD/month</span>
  </div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Service</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
