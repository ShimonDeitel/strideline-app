name: Strideline
options:
  bundleIdPrefix: com.shimondeitel.strideline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Strideline:
    type: application
    platform: iOS
    sources:
      - path: Strideline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.strideline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Strideline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StridelineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StridelineTests
      - path: Strideline.storekit
    dependencies:
      - target: Strideline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.strideline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StridelineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StridelineUITests
    dependencies:
      - target: Strideline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.strideline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Strideline:
    build:
      targets:
        Strideline: all
        StridelineTests: [test]
        StridelineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Strideline.storekit
    test:
      config: Debug
      storeKitConfiguration: Strideline.storekit
      targets:
        - StridelineTests
        - StridelineUITests
    archive:
      config: Release
